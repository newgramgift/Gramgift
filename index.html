<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GramGift World Cup Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030305;
            --card-bg: rgba(10, 10, 16, 0.75);
            --primary: #00ffb3;
            --primary-glow: rgba(0, 255, 179, 0.35);
            --accent: #2d62ff;
            --text-main: #ffffff;
            --text-muted: #6e7f94;
            --border-glass: rgba(255, 255, 255, 0.05);
            --neon-gold: #ffb703;
            --neon-silver: #e2e8f0;
            --neon-bronze: #ffb703;
        }
        
        body {
            background-color: var(--bg-dark); color: var(--text-main); font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px; padding-bottom: 100px;
            background-image: 
                radial-gradient(circle at 80% 0%, rgba(0, 255, 179, 0.08), transparent 40%),
                radial-gradient(circle at 10% 70%, rgba(45, 98, 255, 0.12), transparent 50%);
            background-attachment: fixed; overflow-x: hidden; direction: ltr;
        }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand-title { display: flex; align-items: center; gap: 10px; margin: 0; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.25rem; letter-spacing: 1px; }
        .brand-title i { color: var(--primary); text-shadow: 0 0 12px var(--primary-glow); }

        .online-badge { background: rgba(0, 255, 179, 0.05); border: 1px solid rgba(0, 255, 179, 0.2); padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .online-dot { width: 6px; height: 6px; background-color: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: glowPulse 2s infinite; }
        @keyframes glowPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .balance-value { font-family: 'Orbitron', sans-serif; font-size: 3.2rem; font-weight: 900; text-align: center; margin: 15px 0; color: #fff; }
        .balance-value span { color: var(--primary); text-shadow: 0 0 25px var(--primary-glow); }

        .btn {
            background: linear-gradient(135deg, var(--accent), #1a4cd6); color: white; border: none; padding: 14px;
            border-radius: 14px; width: 100%; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif;
        }
        .btn:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid var(--border-glass); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #00ffb3, #00b37d); color: #030305; font-weight: 800; }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: 10px; width: auto; }

        .date-tab-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .date-tab { background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; color: var(--text-muted); transition: all 0.3s; }
        .date-tab.active { background: linear-gradient(135deg, var(--primary), #00b37d); color: #030305; border-color: var(--primary); font-weight: 800; box-shadow: 0 0 15px rgba(0,255,179,0.2); }

        .match-card { background: rgba(255,255,255,0.01); border: 1px solid var(--border-glass); border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
        .match-main { display: flex; justify-content: space-between; align-items: center; }
        .team-box { width: 40%; text-align: center; font-weight: 700; font-size: 0.95rem; }
        .vs-box { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.03); padding: 4px 10px; border-radius: 8px; }
        .match-meta { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.78rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.02); padding-top: 8px; }

        /* Highly Styled Elite Cyberpunk Leaderboard UI */
        .cyber-leaderboard-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 0.5px; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .rank-list { display: flex; flex-direction: column; gap: 10px; padding: 0; margin: 0; list-style: none; }
        .rank-row {
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 16px; background: rgba(255,255,255,0.01); 
            border: 1px solid rgba(255,255,255,0.03); border-radius: 14px;
            transition: all 0.2s;
        }
        .rank-row:hover { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); }
        .rank-left-side { display: flex; align-items: center; gap: 12px; }
        .rank-index { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; width: 28px; text-align: center; color: var(--text-muted); }
        
        /* Elite Top 3 Badge Styles */
        .row-rank-1 { border-left: 3px solid var(--neon-gold); background: linear-gradient(90deg, rgba(255,183,3,0.03), transparent); }
        .row-rank-1 .rank-index { color: var(--neon-gold); font-size: 1.2rem; }
        .row-rank-2 { border-left: 3px solid #cbd5e1; background: linear-gradient(90deg, rgba(203,213,225,0.03), transparent); }
        .row-rank-2 .rank-index { color: #cbd5e1; }
        .row-rank-3 { border-left: 3px solid #cd7f32; background: linear-gradient(90deg, rgba(205,127,50,0.03), transparent); }
        .row-rank-3 .rank-index { color: #cd7f32; }

        .rank-profile-name { font-weight: 700; font-size: 0.92rem; color: #fff; }
        .rank-submetrics { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        
        /* Right-Aligned Sleek Pool Reward Structure */
        .rank-right-reward { text-align: right; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.85rem; color: var(--primary); }
        .pool-tag { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; display: block; margin-top: 1px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #050508; border-top: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-btn { color: var(--text-muted); font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn span { font-size: 0.7rem; font-weight: 600; }
        .nav-btn.active { color: var(--primary); }

        .score-display-hub { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .score-box-mod { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); padding: 10px; border-radius: 14px; text-align: center; width: 80px; }
        .score-num-val { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; display: block; margin: 5px 0; }
        
        .hidden { display: none !important; }
        .empty-log { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <h3 class="brand-title"><i class="fa-solid fa-bolt"></i> GRAMGIFT MATRIX</h3>
        <div class="online-badge"><div class="online-dot"></div><span id="online-val">1</span> NODES ONLINE</div>
    </div>

    <div id="tab-dash">
        <div class="glass-card text-center" style="border-color: rgba(0,255,179,0.15);">
            <p style="margin:0; font-size:0.85rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Available Token Ledger</p>
            <div class="balance-value"><span id="user-bal-node">0.0</span> ⚽️</div>
        </div>

        <div class="glass-card">
            <h4 style="margin-top:0; font-size:1rem;"><i class="fa-solid fa-share-nodes" style="color:var(--accent);"></i> Referral Node Pipeline</h4>
            <button class="btn" onclick="copySystemInvite()"><i class="fa-solid fa-copy"></i> Copy Allocation Link</button>
            <div id="squad-box" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="tab-arena" class="hidden">
        <div id="arena-manifest-view">
            <div class="date-tab-container" id="arena-date-tabs"></div>
            <div id="arena-fixtures-list"></div>
        </div>

        <div id="arena-lock-view" class="hidden glass-card">
            <button class="btn btn-outline btn-small" onclick="closePredictionInterface()"><i class="fa-solid fa-chevron-left"></i> Exit Config</button>
            <h4 id="lock-teams-title" style="text-align:center; margin:15px 0 5px 0; font-family:'Orbitron',sans-serif;"></h4>
            <p id="lock-meta-desc" style="text-align:center; font-size:0.8rem; color:var(--text-muted); margin:0 0 20px 0;"></p>

            <div class="score-display-hub">
                <div class="score-box-mod">
                    <span id="lock-name-a" style="font-size:0.75rem; font-weight:700; white-space:nowrap; overflow:hidden;"></span>
                    <span class="score-num-val" id="val-score-a">0</span>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-outline btn-small" style="padding:2px 8px;" onclick="modScore('a',1)">+</button>
                        <button class="btn btn-outline btn-small" style="padding:2px 8px;" onclick="modScore('a',-1)">-</button>
                    </div>
                </div>
                <div style="font-family:'Orbitron',sans-serif; font-weight:900; color:var(--text-muted);">VS</div>
                <div class="score-box-mod">
                    <span id="lock-name-b" style="font-size:0.75rem; font-weight:700; white-space:nowrap; overflow:hidden;"></span>
                    <span class="score-num-val" id="val-score-b">0</span>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-outline btn-small" style="padding:2px 8px;" onclick="modScore('b',1)">+</button>
                        <button class="btn btn-outline btn-small" style="padding:2px 8px;" onclick="modScore('b',-1)">-</button>
                    </div>
                </div>
            </div>

            <p style="font-size:0.82rem; margin-bottom:5px; font-weight:600;">Wager Token Quantity Deployment:</p>
            <input type="number" id="wager-input" style="width:100%; padding:12px; background:#000; border:1px solid var(--border-glass); border-radius:10px; color:#fff; font-family:'Orbitron',sans-serif; font-size:1.1rem; box-sizing:border-box; outline:none; text-align:center; margin-bottom:15px;" value="1" min="1">
            <button class="btn btn-success" onclick="commitPredictionLock()">SECURE ARCHITECTURE LOCK</button>
        </div>
    </div>

    <div id="tab-quests" class="hidden">
        <div class="glass-card">
            <h4 style="margin-top:0;"><i class="fa-solid fa-star" style="color:var(--primary)"></i> Active Operations Manifest</h4>
            <div id="quests-render-hub"></div>
        </div>
    </div>

    <div id="tab-ranks" class="hidden">
        <div class="glass-card">
            <h4 class="cyber-leaderboard-title" style="color:var(--neon-gold);"><i class="fa-solid fa-crown"></i> PRO FORECASTER ELITES</h4>
            <ul class="rank-list" id="render-predictor-elite"></ul>
        </div>
        <div class="glass-card">
            <h4 class="cyber-leaderboard-title" style="color:var(--accent);"><i class="fa-solid fa-nodes-diagonal"></i> NETWORK NODES SQUAD</h4>
            <ul class="rank-list" id="render-referrer-elite"></ul>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="routeTab('dash', this)"><i class="fa-solid fa-grip"></i><span>Terminal</span></div>
        <div class="nav-btn" onclick="routeTab('arena', this)"><i class="fa-solid fa-circle-dot"></i><span>Arena</span></div>
        <div class="nav-btn" onclick="routeTab('quests', this)"><i class="fa-solid fa-bolt"></i><span>Quests</span></div>
        <div class="nav-btn" onclick="routeTab('ranks', this)"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id ? tg.initDataUnsafe.user.id.toString() : '0';
        let cachedMatches = {};
        let targetingMatchId = null;

        async function syncNetworkData() {
            try {
                const r = await fetch(`/api/data?user_id=${userId}`);
                const d = await r.json();
                document.getElementById('online-val').innerText = d.online_count;

                if(userId !== '0') {
                    const ur = await fetch(`/api/user/${userId}`);
                    const ud = await ur.json();
                    document.getElementById('user-bal-node').innerText = ud.balance.toFixed(1);

                    const sb = document.getElementById('squad-box');
                    if(ud.invites.length === 0) {
                        sb.innerHTML = '<div class="empty-log">No sub-nodes connected. Spread the terminal hash parameter link.</div>';
                    } else {
                        sb.innerHTML = ud.invites.map(i => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.02); font-size:0.85rem;"><span>👤 ${i.name}</span><span style="color:var(--primary); font-family:'Orbitron';">+${i.reward} ⚽️</span></div>`).join('');
                    }
                }
                syncArenaState(); syncQuestsState(); syncLeaderboardLedge();
            } catch(e){}
        }

        async function syncArenaState() {
            try {
                const r = await fetch('/api/matches');
                const d = await r.json();
                cachedMatches = d.matches;
                const dates = [...new Set(Object.values(cachedMatches).map(m => m.date))];
                const th = document.getElementById('arena-date-tabs');
                
                if(dates.length === 0) {
                    document.getElementById('arena-fixtures-list').innerHTML = '<div class="empty-log">Awaiting match parameter configuration from admin.</div>';
                    return;
                }
                let currentActive = document.querySelector('.date-tab.active')?.innerText || dates[0];
                th.innerHTML = dates.map(dt => `<div class="date-tab ${dt === currentActive ? 'active' : ''}" onclick="filterDateTrack('${dt}', this)">${dt}</div>`).join('');
                renderArenaFixtures(currentActive);
            } catch(e){}
        }

        function filterDateTrack(dt, el) {
            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderArenaFixtures(dt);
        }

        function renderArenaFixtures(dt) {
            const container = document.getElementById('arena-fixtures-list');
            let h = '';
            Object.entries(cachedMatches).forEach(([id, m]) => {
                if(m.date !== dt) return;
                const expired = Math.floor(Date.now() / 1000) >= m.start_time;
                let status = `⏳ Live Context (Locks at ${m.time_display} UTC)`;
                if(expired) status = '🔒 Matrix Frame Locked / Active';
                if(m.settled) status = `🏁 Settled Vector (${m.score_a} - ${m.score_b})`;

                h += `
                    <div class="match-card" onclick="initiateMatchLockSequence('${id}')">
                        <div class="match-main">
                            <div class="team-box">${m.team_a}</div>
                            <div class="vs-box">VS</div>
                            <div class="team-box">${m.team_b}</div>
                        </div>
                        <div class="match-meta"><span>${status}</span><span>${m.desc || ''}</span></div>
                    </div>
                `;
            });
            container.innerHTML = h;
        }

        function initiateMatchLockSequence(id) {
            const m = cachedMatches[id];
            if(Math.floor(Date.now() / 1000) >= m.start_time || m.settled) {
                tg.showAlert("Matrix transmission parameters locked for this node structure.");
                return;
            }
            targetingMatchId = id;
            document.getElementById('lock-teams-title').innerText = `${m.team_a} VS ${m.team_b}`;
            document.getElementById('lock-name-a').innerText = m.team_a;
            document.getElementById('lock-name-b').innerText = m.team_b;
            document.getElementById('lock-meta-desc').innerText = `Closing Configuration Window at ${m.time_display} UTC`;
            
            document.getElementById('val-score-a').innerText = '0';
            document.getElementById('val-score-b').innerText = '0';
            document.getElementById('wager-input').value = '1';

            document.getElementById('arena-manifest-view').classList.add('hidden');
            document.getElementById('arena-lock-view').classList.remove('hidden');
        }

        function closePredictionInterface() {
            document.getElementById('arena-lock-view').classList.add('hidden');
            document.getElementById('arena-manifest-view').classList.remove('hidden');
            targetingMatchId = null;
        }

        function modScore(t, v) {
            const el = document.getElementById(`val-score-${t}`);
            el.innerText = Math.max(0, parseInt(el.innerText) + v);
            tg.HapticFeedback.impactOccurred('light');
        }

        async function commitPredictionLock() {
            const sa = parseInt(document.getElementById('val-score-a').innerText);
            const sb = parseInt(document.getElementById('val-score-b').innerText);
            const amt = parseFloat(document.getElementById('wager-input').value);
            if(!amt || amt <= 0) { tg.showAlert("Invalid token allocation precision."); return; }

            try {
                const r = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId, match_id: targetingMatchId, score_a: sa, score_b: sb, amount: amt })
                });
                const d = await r.json();
                if(d.status === 'success') {
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("🏆 Prediction matrix parameters synced successfully.");
                    closePredictionInterface(); syncNetworkData();
                } else { tg.showAlert(d.message); }
            } catch(e){ tg.showAlert("Protocol broadcast failure."); }
        }

        async function syncQuestsState() {
            if(userId === '0') return;
            try {
                const r = await fetch(`/api/tasks/${userId}`);
                const d = await r.json();
                const container = document.getElementById('quests-render-hub');
                if(d.tasks.length === 0) {
                    container.innerHTML = '<div class="empty-log">🎉 Verification layer absolute. All available quests routed.</div>';
                    return;
                }
                container.innerHTML = d.tasks.map(t => `
                    <div class="match-card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:700; font-size:0.9rem;">Join ${t.channel}</div>
                            <div style="color:var(--primary); font-family:'Orbitron'; font-size:0.75rem; margin-top:3px;">+${t.reward} ⚽️ Allocation</div>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <a href="https://t.me/${t.channel.replace('@','')}" target="_blank" class="btn btn-small btn-outline" style="text-decoration:none;">Link</a>
                            <button class="btn btn-small btn-success" onclick="verifyQuestSync('${t.channel}')">Verify</button>
                        </div>
                    </div>
                `).join('');
            } catch(e){}
        }

        async function verifyQuestSync(ch) {
            try {
                const r = await fetch('/api/check_task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, channel: ch})
                });
                const d = await r.json();
                if(d.status === 'success') {
                    tg.showAlert(`Sequence complete. Allocation parameter credited.`);
                    syncNetworkData();
                } else { tg.showAlert(d.message); }
            } catch(e){}
        }

        async function syncLeaderboardLedge() {
            try {
                const r = await fetch('/api/leaderboard');
                const d = await r.json();
                
                // Render Elite Match Forecasters
                const ph = document.getElementById('render-predictor-elite');
                if(d.predictors.length === 0) {
                    ph.innerHTML = '<div class="empty-log">No predictor vector nodes recorded.</div>';
                } else {
                    ph.innerHTML = d.predictors.map((p, idx) => {
                        let rowClass = (idx === 0) ? 'row-rank-1' : (idx === 1) ? 'row-rank-2' : (idx === 2) ? 'row-rank-3' : '';
                        let rewardText = (idx === 0) ? '50 TON Pool' : (idx === 1) ? '30 TON Pool' : (idx === 2) ? '20 TON Pool' : 'Ecosystem Tier';
                        return `
                            <li class="rank-row ${rowClass}">
                                <div class="rank-left-side">
                                    <span class="rank-index">${idx + 1}</span>
                                    <div>
                                        <div class="rank-profile-name">${p.name}</div>
                                        <div class="rank-submetrics">Exact: ${p.exact} | Wins: ${p.total}</div>
                                    </div>
                                </div>
                                <div class="rank-right-reward">
                                    <span>🏆 ALLOCATED</span>
                                    <span class="pool-tag">${rewardText}</span>
                                </div>
                            </li>
                        `;
                    }).join('');
                }

                // Render Network Referrers
                const rh = document.getElementById('render-referrer-elite');
                if(d.referrers.length === 0) {
                    rh.innerHTML = '<div class="empty-log">No referral nodes structural hashes initialized.</div>';
                } else {
                    rh.innerHTML = d.referrers.map((ref, idx) => {
                        let rowClass = (idx === 0) ? 'row-rank-1' : (idx === 1) ? 'row-rank-2' : (idx === 2) ? 'row-rank-3' : '';
                        return `
                            <li class="rank-row ${rowClass}">
                                <div class="rank-left-side">
                                    <span class="rank-index">${idx + 1}</span>
                                    <div>
                                        <div class="rank-profile-name">${ref.name}</div>
                                    </div>
                                </div>
                                <div class="rank-right-reward">
                                    <span>${ref.count} NODES</span>
                                    <span class="pool-tag">Linked Squad</span>
                                </div>
                            </li>
                        `;
                    }).join('');
                }
            } catch(e){}
        }

        function routeTab(tabId, el) {
            document.getElementById('tab-dash').classList.add('hidden');
            document.getElementById('tab-arena').classList.add('hidden');
            document.getElementById('tab-quests').classList.add('hidden');
            document.getElementById('tab-ranks').classList.add('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            el.classList.add('active'); tg.HapticFeedback.selectionChanged();
            if(tabId === 'arena') closePredictionInterface();
        }

        function copySystemInvite() {
            tg.HapticFeedback.impactOccurred('light');
            const link = `https://t.me/GramGift_io_bot?start=${userId}`;
            navigator.clipboard.writeText(link);
            tg.showAlert("Your unique ecosystem referral path link copied to clipboard.");
        }
