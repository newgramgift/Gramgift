<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Task Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --card-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; user-select: none; transition: background 0.3s;
        }
        body.rtl { direction: rtl; font-family: 'Tahoma', sans-serif; }
        
        /* Header & Lang Toggle */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--bg-color);
        }
        .lang-btn {
            background: var(--secondary-bg-color); color: var(--button-color);
            border: 1px solid var(--button-color); padding: 6px 14px;
            border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .lang-btn:active { transform: scale(0.95); }

        /* Modal Design */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
            z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content {
            background: var(--bg-color); padding: 25px; border-radius: 20px;
            width: 85%; max-width: 340px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .modal-content select, .modal-content input {
            width: 100%; padding: 12px; margin: 12px 0; border-radius: 12px;
            border: 1px solid var(--hint-color); background: var(--secondary-bg-color);
            color: var(--text-color); box-sizing: border-box; outline: none; font-size: 14px;
        }

        /* Days Navigation Bar */
        .days-header {
            display: flex; overflow-x: auto; padding: 12px 10px; background: var(--secondary-bg-color);
            gap: 8px; scroll-behavior: smooth;
        }
        .days-header::-webkit-scrollbar { display: none; }
        .day-btn {
            flex: 0 0 auto; padding: 10px 18px; border-radius: 25px;
            background: var(--bg-color); color: var(--hint-color);
            border: 1px solid transparent; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s;
        }
        .day-btn.active { background: var(--button-color); color: var(--button-text-color); }
        .day-btn.disabled { opacity: 0.4; pointer-events: none; }
        
        /* Content & Cards */
        .container { padding: 20px; }
        .date-title { font-size: 18px; margin-bottom: 15px; font-weight: 600; }
        .task-card {
            background: var(--card-bg); padding: 16px; border-radius: 16px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-info h3 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
        .task-info p { margin: 0; font-size: 13px; color: var(--hint-color); }
        
        /* Action Buttons */
        .task-actions button {
            padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; margin: 0 2px;
        }
        .btn-done { background: #34c759; color: white; }
        .btn-fail { background: #ff3b30; color: white; }
        .btn-status-text { font-weight: bold; font-size: 14px; padding: 6px; }
        .status-pending { color: var(--hint-color); font-style: italic; }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="font-weight: bold; font-size: 16px;" id="logoText">⚡ TaskFlow</div>
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLanguage()">FA</button>
    </div>

    <div id="tzModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTzTitle">Welcome</h2>
            <p id="modalTzDesc">Select your location to align task alerts with your local time:</p>
            <select id="tzSelect"></select>
            <br><br>
            <button id="modalTzBtn" onclick="saveOnboarding()" style="background: var(--button-color); color: var(--button-text-color); border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold;"></button>
        </div>
    </div>

    <div id="addTaskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTaskTitle">New Task</h2>
            <input type="text" id="taskTitle" placeholder="">
            <input type="text" id="taskDuration" placeholder="">
            <br><br>
            <button id="modalTaskSubmit" onclick="submitTask()" style="background: var(--button-color); color: var(--button-text-color); border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold;"></button>
            <button id="modalTaskCancel" onclick="closeModal('addTaskModal')" style="background: transparent; color: var(--hint-color); border: none; padding: 10px; margin-top: 8px; width: 100%;"></button>
        </div>
    </div>

    <div class="days-header" id="daysContainer"></div>

    <div class="container">
        <div class="date-title" id="currentDateDisplay">...</div>
        <div id="tasksContainer"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('bg_color');

        let userId = tg.initDataUnsafe?.user?.id || 999999; 
        let currentLang = localStorage.getItem("user_lang") || "en";
        let selectedDateStr = "";
        const apiUrl = window.location.origin; // خودکار آدرس هاست ریلووی را ست می‌کند

        const words = {
            en: {
                logo: "⚡ TaskFlow", langOpt: "FA", tzTitle: "Your Location", tzDesc: "Where do you live? Choose for precise local notifications.",
                tzBtn: "Save & Continue", taskTitle: "Tomorrow's Schedule", placeholderTask: "What's the plan? (e.g. Physics Study)",
                placeholderTime: "Duration? (e.g. 2 hours)", btnSubmit: "Create Task", btnCancel: "Cancel", today: "Today",
                tomorrow: "Tomorrow", empty: "No tasks set for this day.", done: "✔ Done", undone: "✖ Undone",
                doneStatus: "✅ Completed", failedStatus: "❌ Uncompleted", waiting: "⏳ Locked until tomorrow"
            },
            fa: {
                logo: "⚡ تسک‌فلو", langOpt: "EN", tzTitle: "موقعیت مکانی", tzDesc: "کجا زندگی میکنید؟ برای تنظیم دقیق تایم نوتیفیکیشن‌ها انتخاب کنید.",
                tzBtn: "ثبت و ورود", taskTitle: "برنامه ریزی برای فردا", placeholderTask: "چه کاری قراره انجام بدی؟ (مثلا: مطالعه آمار)",
                placeholderTime: "چند ساعت زمان میبره؟ (مثلا: ۱.۵ ساعت)", btnSubmit: "ثبت برنامه", btnCancel: "انصراف", today: "امروز",
                tomorrow: "فردا", empty: "هیچ برنامه‌ای برای این روز تنظیم نشده است.", done: "✔ انجام شد", undone: "✖ انجام نشد",
                doneStatus: "✅ انجام شده", failedStatus: "❌ انجام نشده", waiting: "⏳ در انتظار فرا رسیدن فردا"
            }
        };

        window.onload = () => {
            applyLanguage();
            checkUserStatus();
            setupCalendar();
        };

        function applyLanguage() {
            document.body.classList.toggle("rtl", currentLang === "fa");
            document.getElementById("langToggleBtn").innerText = words[currentLang].langOpt;
            document.getElementById("logoText").innerText = words[currentLang].logo;
            
            // آپدیت پلیس‌هولدرها و متون مودال‌ها
            document.getElementById("modalTzTitle").innerText = words[currentLang].tzTitle;
            document.getElementById("modalTzDesc").innerText = words[currentLang].tzDesc;
            document.getElementById("modalTzBtn").innerText = words[currentLang].tzBtn;
            document.getElementById("modalTaskTitle").innerText = words[currentLang].taskTitle;
            document.getElementById("taskTitle").placeholder = words[currentLang].placeholderTask;
            document.getElementById("taskDuration").placeholder = words[currentLang].placeholderTime;
            document.getElementById("modalTaskSubmit").innerText = words[currentLang].btnSubmit;
            document.getElementById("modalTaskCancel").innerText = words[currentLang].btnCancel;
        }

        function toggleLanguage() {
            currentLang = currentLang === "en" ? "fa" : "en";
            localStorage.setItem("user_lang", currentLang);
            applyLanguage();
            setupCalendar(); // بازسازی تقویم با فرمت جدید زبانی
            saveUserMetadata();
        }

        function checkUserStatus() {
            let tz = localStorage.getItem("user_tz");
            if (!tz) {
                const modal = document.getElementById("tzModal");
                modal.classList.add("show");
                const select = document.getElementById("tzSelect");
                const systemTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                Intl.supportedValuesOf('timeZone').forEach(t => {
                    let opt = document.createElement("option");
                    opt.value = t; opt.text = t;
                    if(t === systemTz) opt.selected = true;
                    select.appendChild(opt);
                });
            }
        }

        async function saveOnboarding() {
            const tz = document.getElementById("tzSelect").value;
            localStorage.setItem("user_tz", tz);
            document.getElementById("tzModal").classList.remove("show");
            await saveUserMetadata();
        }

        async function saveUserMetadata() {
            let tz = localStorage.getItem("user_tz") || "UTC";
            await fetch(`${apiUrl}/api/user`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, timezone: tz, lang: currentLang})
            });
        }

        function setupCalendar() {
            const container = document.getElementById("daysContainer");
            container.innerHTML = "";
            const today = new Date();
            
            for(let i = -3; i <= 7; i++) {
                let d = new Date(today);
                d.setDate(today.getDate() + i);
                
                let btn = document.createElement("div");
                btn.className = "day-btn";
                if(i > 1) btn.classList.add("disabled"); // مجاز بودن دیدن هفته بعد ولی ست کردن فقط یک روز بعد (فردا)
                
                if(i === 0) btn.innerHTML = words[currentLang].today;
                else if(i === 1) btn.innerHTML = words[currentLang].tomorrow;
                else btn.innerHTML = d.toLocaleDateString(currentLang === 'fa' ? 'fa-IR' : 'en-US', { weekday: 'short' });

                const dateStr = d.toISOString().split('T')[0];
                btn.onclick = () => selectDay(dateStr, btn, i);
                container.appendChild(btn);
                
                if(i === 0) selectDay(dateStr, btn, 0);
            }
        }

        function selectDay(dateStr, btnElement, offset) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            selectedDateStr = dateStr;
            
            const d = new Date(dateStr);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById("currentDateDisplay").innerText = d.toLocaleDateString(currentLang === 'fa' ? 'fa-IR' : 'en-US', options) + ` (${dateStr})`;
            
            fetchAndRenderTasks(dateStr, offset);

            if(offset === 1) { // دکمه اصلی تلگرام بومی فعال برای ثبت فردا
                tg.MainButton.setText(words[currentLang].taskTitle);
                tg.MainButton.show();
                tg.MainButton.onClick(openAddTaskModal);
            } else {
                tg.MainButton.hide();
                tg.MainButton.offClick(openAddTaskModal);
            }
        }

        function openAddTaskModal() {
            document.getElementById("addTaskModal").classList.add("show");
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove("show");
        }

        async function fetchAndRenderTasks(dateStr, offset) {
            const container = document.getElementById("tasksContainer");
            container.innerHTML = "";
            
            const res = await fetch(`${apiUrl}/api/tasks/${userId}/${dateStr}`);
            const tasks = await res.json();
            
            if(tasks.length === 0) {
                container.innerHTML = `<p style='color: var(--hint-color); text-align: center; padding: 20px;'>${words[currentLang].empty}</p>`;
                return;
            }

            tasks.forEach(task => {
                let actionArea = "";
                if(offset === 0) { // امروز: قفل شدن ادیت، فقط مجاز به زدن دکمه انجام دادم/ندادم
                    if(task.status === "pending") {
                        actionArea = `
                            <button class="btn-done" onclick="changeTaskStatus(${task.id}, 'done')">${words[currentLang].done}</button>
                            <button class="btn-fail" onclick="changeTaskStatus(${task.id}, 'undone')">${words[currentLang].undone}</button>
                        `;
                    } else {
                        actionArea = `<span class="btn-status-text">${task.status === 'done' ? words[currentLang].doneStatus : words[currentLang].failedStatus}</span>`;
                    }
                } else if(offset === 1) { // فردا: غیرقابل ویرایش پس از ثبت تا رسیدن فردا
                    actionArea = `<span class="btn-status-text status-pending">${words[currentLang].waiting}</span>`;
                } else { // هفته قبل و روزهای گذشته: فقط نمایش وضعیت نهایی
                    actionArea = `<span class="btn-status-text">${task.status === 'done' ? words[currentLang].doneStatus : words[currentLang].failedStatus}</span>`;
                }

                container.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <h3>${task.title}</h3>
                            <p>${task.duration}</p>
                        </div>
                        <div class="task-actions">${actionArea}</div>
                    </div>
                `;
            });
        }

        async function submitTask() {
            const title = document.getElementById("taskTitle").value.trim();
            const duration = document.getElementById("taskDuration").value.trim();
            if(!title) return tg.showAlert("Please fill in the task title.");

            await fetch(`${apiUrl}/api/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, task_date: selectedDateStr, title: title, duration: duration })
            });

            document.getElementById("taskTitle").value = "";
            document.getElementById("taskDuration").value = "";
            closeModal('addTaskModal');
            fetchAndRenderTasks(selectedDateStr, 1);
        }

        async function changeTaskStatus(taskId, status) {
            await fetch(`${apiUrl}/api/tasks/${taskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: status })
            });
            fetchAndRenderTasks(selectedDateStr, 0);
        }
    </script>
</body>
</html>
